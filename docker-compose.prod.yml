# docker-compose.prod.yml — Production VPS deployment
# Usage: docker compose -f docker-compose.prod.yml up -d
# All services on internal network; exposed to nginx via localhost ports only

version: "3.9"

networks:
  agent-net:
    driver: bridge

volumes:
  neo4j_data:
  chroma_data:
  postgres_data:
  redis_data:

services:
  # ════════════════════════════════════════════════════════════
  # MEMORY LAYER
  # ════════════════════════════════════════════════════════════

  neo4j:
    image: neo4j:5.15
    restart: always
    networks: [agent-net]
    # Not exposed externally — Graphiti connects internally
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD}
      NEO4J_PLUGINS: '["apoc", "graph-data-science"]'
      NEO4J_dbms_memory_heap_initial__size: 512m
      NEO4J_dbms_memory_heap_max__size: 2g
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD", "neo4j", "status"]
      interval: 15s
      timeout: 10s
      retries: 5

  graphiti:
    image: zepai/graphiti:latest
    restart: always
    networks: [agent-net]
    ports:
      - "127.0.0.1:8000:8000"    # Localhost only — nginx proxies externally
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    depends_on:
      neo4j:
        condition: service_healthy

  chroma:
    image: chromadb/chroma:latest
    restart: always
    networks: [agent-net]
    ports:
      - "127.0.0.1:8001:8000"
    volumes:
      - chroma_data:/chroma/chroma

  # ════════════════════════════════════════════════════════════
  # ORCHESTRATION LAYER (Trigger.dev)
  # ════════════════════════════════════════════════════════════

  postgres:
    image: postgres:16
    restart: always
    networks: [agent-net]
    environment:
      POSTGRES_USER: trigger
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: trigger_dev
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trigger"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    networks: [agent-net]
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  trigger-webapp:
    image: ghcr.io/triggerdotdev/trigger.dev:latest
    restart: always
    networks: [agent-net]
    ports:
      - "127.0.0.1:3040:3000"
    environment:
      DATABASE_URL: postgresql://trigger:${POSTGRES_PASSWORD}@postgres:5432/trigger_dev
      REDIS_URL: redis://redis:6379
      SECRET_KEY: ${TRIGGER_SECRET_KEY}
      MAGIC_LINK_SECRET: ${TRIGGER_MAGIC_LINK_SECRET}
      ENCRYPTION_KEY: ${TRIGGER_ENCRYPTION_KEY}
      APP_ORIGIN: https://trigger.${DOMAIN:-yourdomain.com}
      LOGIN_ORIGIN: https://trigger.${DOMAIN:-yourdomain.com}
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  # ════════════════════════════════════════════════════════════
  # AGENT API
  # ════════════════════════════════════════════════════════════

  agent-api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    networks: [agent-net]
    ports:
      - "127.0.0.1:3050:3000"
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      GRAPHITI_URL: http://graphiti:8000
      CHROMA_HOST: chroma
      CHROMA_PORT: 8000
      NODE_ENV: production
    volumes:
      - ./agents:/app/agents:ro
      - ./tools:/app/tools:ro
      - ./mcp-servers:/app/mcp-servers:ro
    depends_on:
      - graphiti
      - chroma
