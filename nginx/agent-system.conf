# /etc/nginx/sites-available/agent-system
# Copy to: sudo cp nginx/agent-system.conf /etc/nginx/sites-available/agent-system
# Enable: sudo ln -s /etc/nginx/sites-available/agent-system /etc/nginx/sites-enabled/
# Test:   sudo nginx -t
# Reload: sudo systemctl reload nginx
#
# After setup, issue SSL certs:
# sudo certbot --nginx -d yourdomain.com -d trigger.yourdomain.com -d api.yourdomain.com

# ── Redirect HTTP → HTTPS ─────────────────────────────────────────────────────
server {
    listen 80;
    server_name trigger.yourdomain.com api.yourdomain.com;
    return 301 https://$host$request_uri;
}

# ── Trigger.dev UI ────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name trigger.yourdomain.com;

    ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;

    # Modern SSL settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    add_header Strict-Transport-Security "max-age=63072000" always;

    # Large body size for file uploads to Trigger.dev
    client_max_body_size 50M;

    location / {
        proxy_pass         http://127.0.0.1:3040;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }
}

# ── Agent API ─────────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name api.yourdomain.com;

    ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    add_header Strict-Transport-Security "max-age=63072000" always;

    # API key authentication at nginx level
    # Set AGENT_API_KEY in nginx env or use a map
    location / {
        # Reject requests without the API key header
        if ($http_x_api_key = "") {
            return 401 '{"error": "API key required"}';
        }

        # Forward to agent API
        proxy_pass         http://127.0.0.1:3050;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Longer timeout for AI responses
        proxy_read_timeout 120s;
        proxy_connect_timeout 30s;
    }

    # Health check — no auth required
    location /health {
        proxy_pass http://127.0.0.1:3050/health;
    }
}
